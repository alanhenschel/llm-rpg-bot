# Promtail scrapes all Docker container stdout/stderr and ships to Loki.
# It parses the JSON log lines so service/level/trace_id/event_id become queryable labels/fields.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use the container name as a label.
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
    pipeline_stages:
      # Parse the JSON our services emit and promote key fields.
      - json:
          expressions:
            service: service
            level: level
            trace_id: trace_id
            event_id: event_id
      - labels:
          service:
          level:
