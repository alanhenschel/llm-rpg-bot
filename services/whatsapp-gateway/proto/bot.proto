syntax = "proto3";

package bot;

option go_package = "github.com/alan/ia-pipeline/whatsapp-gateway/internal/grpc/botpb";

// Bot is the LLM bot's gRPC service. The gateway calls it synchronously
// on the hot path; Kafka carries the same events for analytics only.
service Bot {
  // Process receives one inbound WhatsApp message and streams reply tokens
  // back as they are generated by Ollama. The final chunk carries done=true.
  rpc Process(InboundMessage) returns (stream ReplyChunk);
}

message InboundMessage {
  string event_id      = 1;
  string trace_id      = 2;
  int64  connection_id = 3;
  string jid           = 4;  // chat JID (the sender's WhatsApp address)
  string sender_jid    = 5;
  string body          = 6;
}

message ReplyChunk {
  string text = 1;
  bool   done = 2;  // true on the final (possibly empty) sentinel chunk
}
