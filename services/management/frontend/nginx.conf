server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown route serves index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the management API service (same compose network).
    location /api/ {
        proxy_pass http://management-api:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
