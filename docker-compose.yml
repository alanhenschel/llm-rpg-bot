# WhatsApp AI Chatbot Pipeline — full local stack.
#
#   make up        # start everything
#   make logs      # tail logs
#   make seed-rag  # embed the RPG docs into ChromaDB
#
# Service map:
#   postgres, redis, zookeeper, kafka  -> infra
#   ollama                             -> LLM runtime (llama3)
#   whatsapp-gateway (Go)              -> WhatsApp <-> Kafka bridge
#   llm-bot (Python)                   -> RAG + LLM, inbound -> outbound
#   management-api (Python)            -> analytics + control
#   management-frontend (React/nginx)  -> dashboard UI
#   loki, promtail, grafana            -> log aggregation

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-whatsapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    volumes:
      - zookeeper-data:/bitnami/zookeeper

  kafka:
    image: bitnami/kafka:3.7
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Internal listener for compose services; external for host tooling.
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  whatsapp-gateway:
    build: ./services/whatsapp-gateway
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      llm-bot:
        condition: service_started
    environment:
      POD_ID: ${GATEWAY_POD_ID:-gateway-1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-whatsapp}?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      TOPIC_INBOUND: whatsapp.messages.inbound
      TOPIC_OUTBOUND: whatsapp.messages.outbound
      TOPIC_EVENTS: whatsapp.events
      HTTP_ADDR: ":8080"
      BOT_GRPC_ADDR: "llm-bot:50051"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    restart: unless-stopped

  llm-bot:
    build: ./services/llm-bot
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      LOG_LEVEL: ${LOG_LEVEL_PY:-INFO}
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      CHROMA_PATH: /data/chroma
      RAG_DOCS_PATH: /app/data/rpg_docs
      GRPC_PORT: "50051"
    volumes:
      - llmbot-data:/data
    ports:
      - "${LLM_BOT_PORT:-8000}:8000"
      - "${LLM_BOT_GRPC_PORT:-50051}:50051"
    restart: unless-stopped

  management-api:
    build: ./services/management/api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL_PY:-INFO}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-whatsapp}
      KAFKA_BROKERS: kafka:9092
      TOPIC_OUTBOUND: whatsapp.messages.outbound
      GATEWAY_URL: http://whatsapp-gateway:8080
    ports:
      - "${MANAGEMENT_API_PORT:-9000}:9000"
    restart: unless-stopped

  management-frontend:
    build: ./services/management/frontend
    depends_on:
      - management-api
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:3.0.0
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  postgres-data:
  redis-data:
  zookeeper-data:
  kafka-data:
  ollama-data:
  llmbot-data:
  loki-data:
  grafana-data:
